<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Joe Crop</title>
    <script>
      // Single Page App redirect trick for gh-pages
      // Converts the path into a query parameter, then index.html restores it
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
